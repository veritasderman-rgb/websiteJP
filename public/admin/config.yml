backend:
  name: github
  repo: veritasderman-rgb/websiteJP
  branch: main
  base_url: https://website-jp-gamma.vercel.app
  auth_endpoint: api/auth

media_folder: "public/images/portfolio"
public_folder: "/images/portfolio"

collections:
  - name: "portfolio"
    label: "Portfolio"
    folder: "src/content/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Svatby", value: "svatby" }
          - { label: "Portréty", value: "portrety" }
          - { label: "Rodinné focení", value: "rodina" }
          - { label: "Párové focení", value: "pary" }
          - { label: "Eventy", value: "eventy" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "cover", widget: "image" }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }
        required: false
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Stránky"
    folder: "src/content/pages"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Nastavení webu"
    files:
      - label: "Obecné"
        name: "site"
        file: "src/content/settings/site.json"
        fields:
          - { label: "Název webu", name: "title", widget: "string" }
          - { label: "Podtitulek", name: "tagline", widget: "string" }
          - { label: "Hero text", name: "heroText", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string" }
          - { label: "Telefon", name: "phone", widget: "string" }
          - { label: "Copyright", name: "copyright", widget: "string" }
