backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

locale: cs

collections:
  - name: gallery
    label: Galerie
    folder: src/content/gallery
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { name: title, label: Název, widget: string }
      - { name: date, label: Datum, widget: datetime }
      - name: category
        label: Kategorie
        widget: select
        options:
          - { label: "Architektura & nemovitosti", value: architecture }
          - { label: "Akce & reportáže", value: events }
          - { label: "Portréty & akty", value: portraits }
          - { label: "Krajina & street", value: landscape }
      - { name: tags, label: Tagy, widget: list, default: [] }
      - { name: featured, label: "Hlavní (featured)", widget: boolean, default: false }
      - { name: cover, label: Titulní fotka, widget: image }
      - name: images
        label: Fotky série
        widget: list
        fields:
          - { name: src, label: Fotka, widget: image }
          - { name: alt, label: "Popisek (alt text)", widget: string }
          - { name: caption, label: Caption, widget: string, required: false }
      - { name: location, label: Místo, widget: string, required: false }
      - { name: description, label: Popis, widget: text, required: false }
      - { name: draft, label: Koncept, widget: boolean, default: false }
